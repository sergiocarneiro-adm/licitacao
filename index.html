<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLL Explorer | Teixeira de Freitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' }
                    }
                }
            }
        }
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        details summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 h-full flex flex-col font-sans transition-colors duration-300">

    <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i class="fas fa-file-contract text-xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-none">BLL Explorer</h1>
                    <p class="text-xs text-slate-500 dark:text-slate-400">Teixeira de Freitas - Bahia</p>
                </div>
            </div>
            
            <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block text-amber-400"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full p-4 md:p-6 space-y-6">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <p class="text-xs font-medium text-slate-500 uppercase tracking-wider">Processos</p>
                <h3 id="stat-processos" class="text-2xl font-bold text-blue-600 mt-1">---</h3>
            </div>
            <div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <p class="text-xs font-medium text-slate-500 uppercase tracking-wider">Lotes</p>
                <h3 id="stat-lotes" class="text-2xl font-bold text-emerald-600 mt-1">---</h3>
            </div>
            <div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <p class="text-xs font-medium text-slate-500 uppercase tracking-wider">Itens</p>
                <h3 id="stat-itens" class="text-2xl font-bold text-orange-600 mt-1">---</h3>
            </div>
            <div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
                <p class="text-xs font-medium text-slate-500 uppercase tracking-wider">Atualização</p>
                <h3 id="stat-data" class="text-sm font-bold text-slate-700 dark:text-slate-300 mt-2">---</h3>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm space-y-4">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="main-search" placeholder="Pesquisar por objeto, ID ou condutor..." 
                        class="w-full pl-10 pr-4 py-2 bg-slate-50 dark:bg-slate-800 border-none rounded-lg focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                </div>
                <div class="flex gap-2">
                    <select id="filter-situacao" class="bg-slate-50 dark:bg-slate-800 border-none rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="all">Todas as Situações</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="loading" class="text-center py-20">
            <i class="fas fa-circle-notch fa-spin text-3xl text-blue-600"></i>
            <p class="mt-2 text-slate-500">Carregando dados...</p>
        </div>

        <div id="list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 hidden">
            </div>

    </main>

    <div id="backdrop" class="fixed inset-0 bg-slate-950/40 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300" onclick="closeDetails()"></div>
    
    <aside id="side-panel" class="fixed top-0 right-0 h-full w-full max-w-2xl bg-white dark:bg-slate-900 shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        <div class="p-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between bg-slate-50 dark:bg-slate-900/50">
            <div>
                <h2 id="p-id" class="text-xl font-bold">---</h2>
                <p id="p-mod" class="text-xs text-slate-500 font-medium uppercase tracking-widest mt-1">---</p>
            </div>
            <div class="flex gap-2">
                <button onclick="gerarPDFAtual()" class="p-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg transition-colors shadow-lg shadow-emerald-600/20" title="Exportar PDF">
                    <i class="fas fa-file-pdf"></i>
                </button>
                <button onclick="closeDetails()" class="p-2.5 bg-slate-200 dark:bg-slate-800 hover:bg-rose-500 hover:text-white rounded-lg transition-all">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-8">
            <div class="grid grid-cols-2 gap-4 text-sm">
                <div class="p-3 bg-slate-50 dark:bg-slate-800/50 rounded-lg">
                    <span class="block text-xs text-slate-500 mb-1 italic">Situação atual</span>
                    <span id="p-sit" class="font-bold">---</span>
                </div>
                <div class="p-3 bg-slate-50 dark:bg-slate-800/50 rounded-lg">
                    <span class="block text-xs text-slate-500 mb-1 italic">Condutor do Processo</span>
                    <span id="p-cond" class="font-bold truncate block">---</span>
                </div>
            </div>

            <section>
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                    <i class="fas fa-align-left text-blue-500"></i> Objeto
                </h3>
                <p id="p-obj" class="text-slate-700 dark:text-slate-300 leading-relaxed text-sm bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 p-4 rounded-xl shadow-sm">---</p>
            </section>

            <section>
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <i class="fas fa-layer-group text-emerald-500"></i> Lotes e Itens Detalhados
                    </h3>
                    <span id="p-count-lotes" class="text-xs bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded font-bold">0 Lotes</span>
                </div>
                <div id="lotes-container" class="space-y-3">
                    </div>
            </section>
        </div>
    </aside>

    <script>
        let fullData = null;
        let activeProcess = null;

        // --- Inicialização ---
        async function loadData() {
            try {
                const response = await fetch('dados.json');
                fullData = await response.json();
                initApp();
            } catch (err) {
                console.error("Erro ao carregar JSON:", err);
                document.getElementById('loading').innerHTML = `<p class="text-rose-500">Erro ao carregar dados. Verifique o arquivo dados (1).json</p>`;
            }
        }

        function initApp() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('list-container').classList.remove('hidden');

            // Atualizar Dashboard
            document.getElementById('stat-processos').innerText = fullData.metadata.total_processos;
            document.getElementById('stat-lotes').innerText = fullData.metadata.total_lotes;
            document.getElementById('stat-itens').innerText = fullData.metadata.total_itens;
            document.getElementById('stat-data').innerText = formatarDataISO(fullData.metadata.atualizado_em);

            // Popular Filtros
            const situacoes = [...new Set(fullData.processos.map(p => p.situacao))];
            const select = document.getElementById('filter-situacao');
            situacoes.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.innerText = s;
                select.appendChild(opt);
            });

            renderList(fullData.processos);
        }

        // --- Renderização ---
        function renderList(list) {
            const container = document.getElementById('list-container');
            container.innerHTML = list.map(p => `
                <div onclick="openDetails('${p.id}')" class="group bg-white dark:bg-slate-900 p-5 rounded-2xl border border-slate-200 dark:border-slate-800 hover:border-blue-500 dark:hover:border-blue-500 transition-all cursor-pointer shadow-sm hover:shadow-xl hover:shadow-blue-500/10">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-xs font-bold text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30 px-2 py-1 rounded">${p.id}</span>
                        <span class="text-[10px] text-slate-400 font-mono">${p.numero_adm}</span>
                    </div>
                    <h4 class="font-bold text-slate-800 dark:text-slate-200 line-clamp-2 mb-3 group-hover:text-blue-600 transition-colors">${p.objeto}</h4>
                    <div class="flex items-center justify-between mt-auto pt-4 border-t border-slate-50 dark:border-slate-800">
                        <span class="text-[11px] px-2 py-0.5 rounded-full ${getBadgeClass(p.situacao)}">${p.situacao}</span>
                        <span class="text-[10px] text-slate-400"><i class="far fa-calendar-alt mr-1"></i>${p.publicacao.split(' ')[0]}</span>
                    </div>
                </div>
            `).join('');
        }

        // --- Detalhamento (Off-canvas) ---
        function openDetails(id) {
            activeProcess = fullData.processos.find(p => p.id === id);
            
            document.getElementById('p-id').innerText = activeProcess.id;
            document.getElementById('p-mod').innerText = activeProcess.modalidade;
            document.getElementById('p-sit').innerText = activeProcess.situacao;
            document.getElementById('p-cond').innerText = activeProcess.condutor || 'Não informado';
            document.getElementById('p-obj').innerText = activeProcess.objeto;
            document.getElementById('p-count-lotes').innerText = `${activeProcess.lotes?.length || 0} Lotes`;

            renderLotes(activeProcess.lotes || []);

            // Animação
            const backdrop = document.getElementById('backdrop');
            const panel = document.getElementById('side-panel');
            backdrop.classList.remove('hidden');
            setTimeout(() => {
                backdrop.classList.remove('opacity-0');
                panel.classList.remove('translate-x-full');
            }, 10);
        }

        function closeDetails() {
            const backdrop = document.getElementById('backdrop');
            const panel = document.getElementById('side-panel');
            backdrop.classList.add('opacity-0');
            panel.classList.add('translate-x-full');
            setTimeout(() => backdrop.classList.add('hidden'), 300);
        }

        function renderLotes(lotes) {
            const container = document.getElementById('lotes-container');
            container.innerHTML = lotes.map(l => `
                <details class="group border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden bg-white dark:bg-slate-900 transition-all">
                    <summary class="flex items-center justify-between p-4 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50 list-none">
                        <div class="flex gap-4 items-center">
                            <span class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-xs font-bold">L${l.numero}</span>
                            <span class="text-sm font-semibold truncate max-w-[300px]">${l.descricao || 'Sem descrição'}</span>
                        </div>
                        <i class="fas fa-chevron-down text-xs text-slate-400 group-open:rotate-180 transition-transform"></i>
                    </summary>
                    <div class="px-4 pb-4 border-t border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-950/30">
                        <div class="overflow-x-auto mt-4 rounded-lg border border-slate-200 dark:border-slate-800">
                            <table class="w-full text-[11px] text-left">
                                <thead class="bg-slate-100 dark:bg-slate-800 text-slate-500 uppercase">
                                    <tr>
                                        <th class="p-2 w-10">Item</th>
                                        <th class="p-2">Especificação</th>
                                        <th class="p-2 text-right">Qtd/Unid</th>
                                        <th class="p-2 text-right">Valor Ref.</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${l.itens.map(it => `
                                        <tr class="border-t border-slate-100 dark:border-slate-800">
                                            <td class="p-2 font-bold">${it.numero}</td>
                                            <td class="p-2 text-slate-600 dark:text-slate-400">${it.especificacao}</td>
                                            <td class="p-2 text-right whitespace-nowrap">${it.quantidade} ${it.unidade}</td>
                                            <td class="p-2 text-right font-semibold">R$ ${it.valor_referencia}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </details>
            `).join('');
        }

        // --- Exportação PDF ---
        function gerarPDFAtual() {
            if (!activeProcess) return;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const p = activeProcess;

            // Header
            doc.setFontSize(10);
            doc.text("MUNICIPIO DE TEIXEIRA DE FREITAS", 105, 15, { align: "center" });
            doc.setFontSize(14).setFont(undefined, 'bold');
            doc.text(`RELATÓRIO TÉCNICO: ${p.id}`, 20, 30);
            
            // Info Table
            doc.autoTable({
                startY: 35,
                body: [
                    ["Modalidade", p.modalidade, "Status", p.situacao],
                    ["Proc. Adm", p.numero_adm, "Condutor", p.condutor || "---"]
                ],
                theme: 'plain', styles: { fontSize: 8, cellPadding: 1 }
            });

            // Objeto
            doc.setFontSize(9).setFont(undefined, 'bold').text("OBJETO:", 20, doc.lastAutoTable.finalY + 10);
            doc.setFont(undefined, 'normal');
            const splitObj = doc.splitTextToSize(p.objeto, 170);
            doc.text(splitObj, 20, doc.lastAutoTable.finalY + 15);

            // Lotes
            let y = doc.lastAutoTable.finalY + 20 + (splitObj.length * 4);
            p.lotes.forEach(l => {
                if (y > 260) { doc.addPage(); y = 20; }
                
                doc.setFontSize(10).setFont(undefined, 'bold');
                doc.setFillColor(245, 245, 245).rect(20, y, 170, 7, 'F');
                doc.text(`LOTE ${l.numero} - ${l.descricao || ''}`, 22, y + 5);

                doc.autoTable({
                    startY: y + 8,
                    head: [['Item', 'Especificação', 'Qtd', 'Unid', 'Valor Ref.']],
                    body: l.itens.map(i => [i.numero, i.especificacao, i.quantidade, i.unidade, `R$ ${i.valor_referencia}`]),
                    styles: { fontSize: 7 }, headStyles: { fillColor: [37, 99, 235] },
                    margin: { left: 20 }, tableWidth: 170
                });
                y = doc.lastAutoTable.finalY + 10;
            });

            doc.save(`${p.id}_detalhes.pdf`);
        }

        // --- Helpers ---
        function formatarDataISO(iso) {
            if(!iso) return "---";
            const ano = iso.substring(0,4);
            const mes = iso.substring(4,6);
            const dia = iso.substring(6,8);
            return `${dia}/${mes}/${ano}`;
        }

        function getBadgeClass(sit) {
            const s = sit.toUpperCase();
            if(s.includes('RECEPÇÃO')) return 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300';
            if(s.includes('HOMOLOGADO') || s.includes('ADJUDICADO')) return 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300';
            if(s.includes('SUSPENSO') || s.includes('CANCELADO')) return 'bg-rose-100 text-rose-700 dark:bg-rose-900/40 dark:text-rose-300';
            return 'bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-400';
        }

        // Filtro
        document.getElementById('main-search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const sit = document.getElementById('filter-situacao').value;
            const filtered = fullData.processos.filter(p => {
                const matchSearch = p.objeto.toLowerCase().includes(term) || p.id.toLowerCase().includes(term);
                const matchSit = sit === 'all' || p.situacao === sit;
                return matchSearch && matchSit;
            });
            renderList(filtered);
        });

        document.getElementById('filter-situacao').addEventListener('change', () => {
            document.getElementById('main-search').dispatchEvent(new Event('input'));
        });

        loadData();
    </script>
</body>
</html>
